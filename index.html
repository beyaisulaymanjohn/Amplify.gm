<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMPLIFY — Agency Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080a;--surface:#0e1014;--surface2:#151820;--border:#1e2230;--border2:#252a3a;--accent:#00e5ff;--accent2:#ff2d6b;--accent3:#7c3aed;--text:#e8eaf0;--text2:#7a8099;--text3:#3d4260;--green:#00f5a0;--yellow:#ffd60a;--red:#ff2d6b;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:8px;--radius-lg:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0}
.page{flex:1;padding:28px;overflow-y:auto}

.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;color:#000;flex-shrink:0}
.logo-text{font-family:var(--font-display);font-size:22px;letter-spacing:2px}
.sidebar-section{padding:16px 12px 6px;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:500;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:rgba(0,229,255,.07)}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.client-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:2px 8px;border-radius:var(--radius);cursor:pointer;transition:background .15s}
.client-item:hover{background:var(--surface2)}
.client-item.active{background:rgba(0,229,255,.05)}
.client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.client-name{font-size:13px;color:var(--text2);font-weight:500}
.client-item.active .client-name{color:var(--text)}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;margin-top:auto}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

.topbar-title{font-family:var(--font-display);font-size:20px;letter-spacing:1.5px;flex:1}
.topbar-client{display:flex;align-items:center;gap:7px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;font-size:12px;color:var(--text2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s;line-height:1}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#33eeff;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-danger{background:rgba(255,45,107,.12);color:var(--red);border:1px solid rgba(255,45,107,.3)}
.btn-success{background:rgba(0,245,160,.1);color:var(--green);border:1px solid rgba(0,245,160,.3)}
.btn-purple{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.btn-purple:hover{background:rgba(124,58,237,.25)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-color,var(--accent))}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:36px;letter-spacing:1px;color:var(--text);line-height:1}
.stat-delta{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11.5px;font-weight:600}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:860px){.grid-4,.grid-3,.grid-2,.grid-2-1{grid-template-columns:1fr}}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
td.strong{color:var(--text);font-weight:500}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,245,160,.1);color:var(--green);border:1px solid rgba(0,245,160,.2)}
.badge-blue{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2)}
.badge-red{background:rgba(255,45,107,.1);color:var(--red);border:1px solid rgba(255,45,107,.2)}
.badge-yellow{background:rgba(255,214,10,.1);color:var(--yellow);border:1px solid rgba(255,214,10,.2)}
.badge-gray{background:rgba(122,128,153,.1);color:var(--text3);border:1px solid var(--border)}
.badge-purple{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}

.platform-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.chip-twitter{background:rgba(29,161,242,.12);color:#1da1f2}
.chip-instagram{background:rgba(228,64,95,.12);color:#e4405f}
.chip-facebook{background:rgba(24,119,242,.12);color:#1877f2}
.chip-linkedin{background:rgba(10,102,194,.12);color:#0a66c2}
.chip-tiktok{background:rgba(254,44,85,.12);color:#fe2c55}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.5px}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px;font-size:13.5px;color:var(--text);font-family:var(--font-body);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:90px}
select option{background:var(--surface2)}
.char-count{float:right;font-size:11px;color:var(--text3);font-family:var(--font-mono)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease}
.modal-wide{max-width:780px}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-display);font-size:20px;letter-spacing:1px}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border)}
.close-btn{width:28px;height:28px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.close-btn:hover{background:var(--surface2);color:var(--text)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-display);font-size:17px;letter-spacing:1px}
.section-sub{font-size:12.5px;color:var(--text3);margin-top:2px}
.divider{height:1px;background:var(--border);margin:20px 0}
.flex{display:flex;align-items:center}
.gap-8{gap:8px}
.gap-12{gap:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.mono{font-family:var(--font-mono);font-size:12px}

.chart-area{height:140px;display:flex;align-items:flex-end;gap:3px;padding-top:20px}
.chart-bar{flex:1;border-radius:3px 3px 0 0;background:var(--accent);opacity:.7;transition:opacity .15s;min-height:4px;cursor:pointer}
.chart-bar:hover{opacity:1}
.chart-label{font-size:10px;color:var(--text3);text-align:center;margin-top:4px}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:40px;position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-mark{width:48px;height:48px;font-size:30px;margin:0 auto 12px}
.login-logo .logo-text{font-size:32px;letter-spacing:3px}
.login-sub{font-size:13px;color:var(--text3);margin-top:4px}
.login-error{padding:10px 14px;background:rgba(255,45,107,.08);border:1px solid rgba(255,45,107,.2);border-radius:var(--radius);font-size:13px;color:var(--red);margin-bottom:16px}
.login-demo{margin-top:20px;padding:14px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);border-radius:var(--radius)}
.login-demo-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.login-demo-item{font-family:var(--font-mono);font-size:11.5px;color:var(--text2);margin-bottom:3px}
.login-demo-item span{color:var(--accent)}

.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner-lg{width:36px;height:36px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3)}

.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:all;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;animation:toastIn .25s ease;min-width:260px;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast-success{background:#0d2d1f;border:1px solid rgba(0,245,160,.3);color:var(--green)}
.toast-error{background:#2d0d1a;border:1px solid rgba(255,45,107,.3);color:var(--red)}
.toast-info{background:#0d1a2d;border:1px solid rgba(0,229,255,.3);color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* Platform connect cards */
.platform-connect-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:center;gap:14px}
.platform-icon-lg{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.platform-info{flex:1}
.platform-name{font-weight:600;font-size:14px;color:var(--text)}
.platform-status{font-size:12px;color:var(--text3);margin-top:2px}
.connected-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600}

/* AI generation */
.ai-result-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.ai-platform-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ai-body-text{font-size:13.5px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.ai-score-ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;border:3px solid var(--accent);color:var(--accent);flex-shrink:0}

.plat-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12.5px;font-weight:600;font-family:var(--font-body);transition:all .15s}
.plat-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06)}
.platform-toggle{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.override-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px}
.override-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s ease}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-container" id="toasts"></div>
<script type="module">
const API = 'https://qtwvurbfxodsmztcagth.supabase.co/functions/v1/amplify-api';

// ── State ──────────────────────────────────
let state = {
  page: 'login', subpage: null,
  token: localStorage.getItem('amp_token'),
  user:  JSON.parse(localStorage.getItem('amp_user') || 'null'),
  clients: JSON.parse(localStorage.getItem('amp_clients') || '[]'),
  activeClient: null,
  data: {}, loading: {}, modal: null,
};

// ── Toast ──────────────────────────────────
function toast(msg, type='info', ms=3500) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${{success:'✓',error:'✕',info:'ℹ'}[type]||'•'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.cssText+='opacity:0;transform:translateX(20px);transition:all .3s'; setTimeout(()=>t.remove(),300) }, ms);
}

// ── API ────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (state.token && state.token !== 'demo') opts.headers['Authorization'] = `Bearer ${state.token}`;
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(`${API}${path}`, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  } catch(e) {
    if (e.message.match(/fetch|Failed|NetworkError/)) throw new Error('Backend offline — running in demo mode');
    throw e;
  }
}

// ── Auth ───────────────────────────────────
async function login(email, password) {
  const data = await api('POST','/api/auth/login',{email,password});
  state.token = data.access_token;
  state.user = data.user;
  state.clients = data.clients || [];
  localStorage.setItem('amp_token', state.token);
  localStorage.setItem('amp_user', JSON.stringify(state.user));
  localStorage.setItem('amp_clients', JSON.stringify(state.clients));
  if (state.clients.length) state.activeClient = state.clients[0];
  navigate('dashboard');
}
function logout() {
  api('POST','/api/auth/logout').catch(()=>{});
  ['amp_token','amp_user','amp_clients'].forEach(k=>localStorage.removeItem(k));
  Object.assign(state, {token:null,user:null,clients:[],activeClient:null,data:{}});
  navigate('login');
}

// ── Fetchers ───────────────────────────────
async function fetchDashboard(cid) {
  state.loading.dashboard = true; render();
  try {
    const [ov, an] = await Promise.all([
      api('GET','/api/agency/overview'),
      api('GET',`/api/clients/${cid}/analytics/dashboard?days=30`),
    ]);
    state.data.overview = ov.overview;
    state.data.analytics = an;
  } catch(e) { state.data.overview = MOCK.overview; state.data.analytics = MOCK.analytics; }
  state.loading.dashboard = false; render();
}
async function fetchContent(cid) {
  state.loading.content = true; render();
  try { const d = await api('GET',`/api/clients/${cid}/content`); state.data.content = d.content||d; }
  catch(e) { state.data.content = MOCK.content; }
  state.loading.content = false; render();
}
async function fetchClients() {
  state.loading.clients = true; render();
  try { const d = await api('GET','/api/clients'); state.data.clientList = d.clients||d; }
  catch(e) { state.data.clientList = MOCK.clients; }
  state.loading.clients = false; render();
}
async function fetchConnections(cid) {
  try { const d = await api('GET',`/api/oauth/status/${cid}`); state.data.connections = d.connections||[]; }
  catch(e) { state.data.connections = MOCK.connections; }
  render();
}

// ── MOCK ───────────────────────────────────
const MOCK = {
  overview: {total_clients:3,total_users:5,connected_platforms:8,total_reach_30d:142890},
  analytics: {
    summary:{impressions:142890,engagements:8340,reach:98210,posts_published:47,avg_engagement_rate:5.84},
    by_platform:[
      {platform:'twitter',impressions:52000,engagements:3100,followers:8240,engagement_rate:5.96},
      {platform:'instagram',impressions:61000,engagements:4200,followers:12400,engagement_rate:6.89},
      {platform:'facebook',impressions:22000,engagements:890,followers:5600,engagement_rate:4.05},
      {platform:'linkedin',impressions:7890,engagements:150,followers:2100,engagement_rate:1.90},
    ],
    daily:[
      {date:'Mar 24',impressions:4200},{date:'Mar 25',impressions:6100},{date:'Mar 26',impressions:3800},
      {date:'Mar 27',impressions:7900},{date:'Mar 28',impressions:5500},{date:'Mar 29',impressions:9200},{date:'Mar 30',impressions:8400},
    ]
  },
  content:[
    {id:'c1',title:'Spring Campaign Launch',status:'published',platforms:['twitter','instagram'],created_at:'2026-03-28',author:'Jordan Lee'},
    {id:'c2',title:'Product Feature Spotlight',status:'scheduled',platforms:['linkedin','facebook'],created_at:'2026-03-27',author:'Sarah Kim'},
    {id:'c3',title:'Behind the Scenes',status:'draft',platforms:['instagram'],created_at:'2026-03-26',author:'Amy Chen'},
    {id:'c4',title:'Weekly Fitness Tips',status:'published',platforms:['twitter','instagram','facebook'],created_at:'2026-03-25',author:'Jordan Lee'},
    {id:'c5',title:'Client Success Story',status:'failed',platforms:['twitter'],created_at:'2026-03-24',author:'Sarah Kim'},

function statusBadge(s) {

function miniChart(data) {
  if (!data?.length) return '';
  const vals = data.map(d=>d.impressions||0), max = Math.max(...vals)||1;
  return `<div class="chart-area">${vals.map((v,i)=>`
    <div style="display:flex;flex-direction:column;flex:1;align-items:center">
      <div class="chart-bar" style="height:${Math.max(4,Math.round(v/max*130))}px" title="${data[i].date}: ${v.toLocaleString()}"></div>
      <div class="chart-label">${(data[i].date||'').split(' ')[1]||''}</div>
    </div>`).join('')}</div>`;
}

window.navigate = function(page) {
  state.page = page;
  if (page==='dashboard' && state.activeClient) fetchDashboard(state.activeClient.id);
  else if (page==='content' && state.activeClient) fetchContent(state.activeClient.id);
  else if (page==='analytics' && state.activeClient) fetchDashboard(state.activeClient.id);
  else if (page==='clients') fetchClients();
  else if (page==='connections' && state.activeClient) fetchConnections(state.activeClient.id);
  else render();
};
window.selectClient = function(id) {
  state.activeClient = state.clients.find(c=>c.id===id)||{id};
  if (['dashboard','analytics'].includes(state.page)) fetchDashboard(id);
  else if (state.page==='content') fetchContent(id);
  else if (state.page==='connections') fetchConnections(id);
  else render();
};
window.selectClientAndGo = function(id, page) { state.activeClient=state.clients.find(c=>c.id===id)||{id}; navigate(page); };
window.logout = logout;

window.handleLogin = async function() {
  const btn = document.querySelector('.login-card .btn-primary');
  const err = document.getElementById('login-error');
  const email = document.getElementById('email')?.value?.trim();
  const password = document.getElementById('password')?.value;
  if (!email||!password) { err.textContent='Enter email and password'; err.style.display='block'; return; }
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  err.style.display='none';
  try {
    await login(email, password);
    toast('Welcome back!','success');
  } catch(e) {
    if (e.message.includes('demo mode')||e.message.includes('offline')) {
      toast('Backend offline — demo mode','info',5000);
      state.token='demo'; state.user={full_name:'Jordan Lee (Demo)',email:'jordan@tigermedia.com',role:'admin'};
      state.clients=MOCK.clients; state.activeClient=MOCK.clients[0];
      state.data={overview:MOCK.overview,analytics:MOCK.analytics};
      navigate('dashboard');
    } else {
      err.textContent=e.message; err.style.display='block';
    }
  } finally { if(btn){btn.disabled=false;btn.textContent='Sign In';} }
};
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&state.page==='login') window.handleLogin?.(); });

  navigator.clipboard?.writeText(text).then(()=>toast('Copied!','success')).catch(()=>toast('Copy failed','error'));
};

window.submitNewContent = async function() {
  const title=document.getElementById('nc-title')?.value?.trim();
  const body=document.getElementById('nc-body')?.value?.trim();
  if(!title||!body){toast('Title and body required','error');return;}
  try {
    await api('POST',`/api/clients/${state.activeClient?.id}/content`,{title,body,content_type:document.getElementById('nc-type')?.value});
    toast('Draft saved!','success'); state.modal=null; fetchContent(state.activeClient?.id);
  } catch(e) {
    const fake={id:'new-'+Date.now(),title,status:'draft',platforms:[],created_at:new Date().toISOString(),author:state.user?.full_name||'You'};
    state.data.content=[fake,...(state.data.content||MOCK.content)];
    state.modal=null; render(); toast('Demo: draft saved','success');
  }
};

window.submitPublish = async function(contentId) {
  const btn=document.getElementById('pub-btn'); if(btn)btn.disabled=true;
  const platforms=[...document.querySelectorAll('.plat-btn.selected')].map(b=>b.dataset.platform);
  const scheduled=document.getElementById('pub-schedule')?.value;
  const payload={platforms,scheduled_at:scheduled?new Date(scheduled).toISOString():null,body_overrides:{}};
  const ot=document.getElementById('ov-twitter')?.value; if(ot)payload.body_overrides.twitter=ot;
  const ol=document.getElementById('ov-linkedin')?.value; if(ol)payload.body_overrides.linkedin=ol;
  try {
    const data=await api('POST',`/api/clients/${state.activeClient?.id}/content/${contentId}/publish`,payload);
    toast(`${data.message||'Publishing!'}`, 'success');
    state.modal=null; fetchContent(state.activeClient?.id);
  } catch(e) {
    if(state.data.content){const item=state.data.content.find(c=>c.id===contentId);if(item){item.status=scheduled?'scheduled':'published';item.platforms=platforms;}}
    state.modal=null; render(); toast(`Demo: ${scheduled?'scheduled':'published'}`,'success');
  }
};

window.submitNewClient = async function() {
  const name=document.getElementById('cl-name')?.value?.trim();
  if(!name){toast('Name required','error');return;}
  try {
    await api('POST','/api/clients',{name,industry:document.getElementById('cl-industry')?.value,website:document.getElementById('cl-website')?.value,brand_voice:document.getElementById('cl-voice')?.value,brand_color:document.getElementById('cl-color')?.value});
    toast('Client created!','success'); state.modal=null; fetchClients();
  } catch(e) {
    const fake={id:'cl-'+Date.now(),name,industry:document.getElementById('cl-industry')?.value,brand_color:document.getElementById('cl-color')?.value,is_active:true,connected_platforms:0};
    state.data.clientList=[fake,...(state.data.clientList||MOCK.clients)];
    state.clients=[...state.clients,fake]; state.modal=null; render(); toast('Demo: client added','success');
  }
};

  const email=document.getElementById('inv-email')?.value?.trim();
  if(!email){toast('Email required','error');return;}
  try { await api('POST','/api/auth/invite',{email,full_name:document.getElementById('inv-name')?.value,role:document.getElementById('inv-role')?.value}); toast(`Invite sent to ${email}`,'success'); }
  catch(e) { toast(e.message.includes('offline')?`Demo: invite sent to ${email}`:e.message, e.message.includes('offline')?'success':'error'); }
  state.modal=null; render();
};

window.connectPlatform = async function(platform) {
  if(!state.activeClient?.id||state.token==='demo'){toast(`Demo: OAuth flow would open for ${platform}`,'info');return;}
  try {
    const data=await api('GET',`/api/oauth/${platform}/connect?clientId=${state.activeClient.id}`);
    if(data.auth_url){window.open(data.auth_url,'_blank','width=600,height=700');toast(`Opening ${platform} auth…`,'info');}
  } catch(e){toast(e.message,'error');}
};

window.disconnectPlatform = async function(platform) {
  if(!state.activeClient?.id||state.token==='demo'){toast(`Demo: would disconnect ${platform}`,'info');return;}
  try {
    await api('DELETE',`/api/clients/${state.activeClient.id}/connections/${platform}`);
    toast(`${platform} disconnected`,'success'); fetchConnections(state.activeClient.id);
  } catch(e){toast(e.message,'error');}
};

window.runAIGenerate = async function() {
  const topic=document.getElementById('ai-topic')?.value?.trim();
  if(!topic){toast('Enter a topic','error');return;}
  const platforms=[...document.querySelectorAll('#ai-plat-toggles .plat-btn.selected')].map(b=>b.dataset.platform);
  const tone=document.getElementById('ai-tone')?.value;
  const kw=document.getElementById('ai-keywords')?.value;
  const keywords=kw?kw.split(',').map(k=>k.trim()).filter(Boolean):[];
  state.modal={...state.modal,loading:true,topic}; render();
  try {
    const data=await api('POST',`/api/clients/${state.activeClient?.id||'demo'}/ai/generate`,{topic,platforms,tone:tone||undefined,keywords,save_draft:false});
    state.modal={...state.modal,loading:false,result:data.generated};
    state.data.lastGenerated=data.generated;
  } catch(e) {
    // Demo fallback
    const demo={posts:{},suggested_title:topic,content_tips:['Use questions to drive engagement','Post at peak times for your audience']};
    platforms.forEach(p=>{demo.posts[p]={body:`🚀 ${topic} — exciting things are happening! Stay tuned for more updates. Our team is working hard to bring you the best experience. Drop a comment below and let us know what you think! ${p==='twitter'?'#trending':p==='linkedin'?'#professional #industry':'#marketing #growth'}`,hashtags:['#marketing','#growth','#amplify']};});
    state.modal={...state.modal,loading:false,result:demo};
    state.data.lastGenerated=demo;
    toast('Demo: AI generation simulated','info');
  }
  render();
};

window.saveAIAsDraft = async function() {
  const result=state.modal?.result;
  const topic=state.modal?.topic||'AI Generated Post';
  if(!result?.posts)return;
  const firstPlatform=Object.keys(result.posts)[0];
  const body=result.posts[firstPlatform]?.body||'';
  try {
    await api('POST',`/api/clients/${state.activeClient?.id}/content`,{title:result.suggested_title||topic,body,tags:result.posts[firstPlatform]?.hashtags||[]});
    toast('Saved as draft!','success');
  } catch(e){
    const fake={id:'ai-'+Date.now(),title:result.suggested_title||topic,status:'draft',platforms:[],created_at:new Date().toISOString(),author:state.user?.full_name||'AI'};
    state.data.content=[fake,...(state.data.content||MOCK.content)];
    toast('Demo: saved as draft','success');
  }
  state.modal=null; render();
};

window.runAIScore = async function() {
  const text=document.getElementById('score-text')?.value?.trim();
  const platform=document.getElementById('score-platform')?.value||'instagram';
  if(!text){toast('Paste some content to score','error');return;}
  state.modal={...state.modal,loading:true}; render();
  try {
    const data=await api('POST',`/api/clients/${state.activeClient?.id||'demo'}/ai/score`,{text,platform});
    state.modal={...state.modal,loading:false,result:data};
  } catch(e) {
    const score=Math.floor(55+Math.random()*35);
    state.modal={...state.modal,loading:false,result:{score,grade:score>=80?'A':score>=70?'B':score>=60?'C':'D',predicted_engagement:score>=80?'high':score>=65?'medium':'low',best_posting_time:'Tuesday–Thursday, 6–8 PM',strengths:['Clear call to action','Good use of hashtags'],improvements:['Add more emojis to increase reach','Try a question to drive comments']}};
    toast('Demo: score simulated','info');
  }
  render();
};

window.runAICalendar = async function() {
  const days=parseInt(document.getElementById('cal-days')?.value||'7');
  const themes=document.getElementById('cal-themes')?.value?.split(',').map(t=>t.trim()).filter(Boolean)||[];
  const platforms=[...document.querySelectorAll('.platform-toggle .plat-btn.selected')].map(b=>b.dataset.platform);
  state.modal={...state.modal,loading:true}; render();
  try {
    const data=await api('POST',`/api/clients/${state.activeClient?.id||'demo'}/ai/calendar`,{days,themes,platforms});
    state.modal={...state.modal,loading:false,result:data};
  } catch(e) {
    const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const types=['educational','promotional','engagement','behind-scenes'];
    const calendar=Array.from({length:days>7?7:days},(_,i)=>({day:i+1,date_label:dayNames[i%7],theme:themes[i%themes.length]||`Week ${Math.floor(i/7)+1} Content`,best_time:'6:00 PM',content_type:types[i%4],posts:{twitter:`Day ${i+1}: ${themes[0]||'Engaging content'} — share your thoughts! #marketing`,instagram:`📸 Day ${i+1} content here. Perfect for your feed. Tag a friend who needs to see this! #growth #amplify`}}));
    state.modal={...state.modal,loading:false,result:{calendar}};
    toast('Demo: calendar generated','info');
  }
  render();
};

// ── Boot ──────────────────────────────────
if (state.token&&state.user) {
  state.activeClient=state.clients[0]||null;
  navigate('dashboard');
  if (state.activeClient) fetchDashboard(state.activeClient.id);
} else {
  render();
}
</script>
</body>
</html>
